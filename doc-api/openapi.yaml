components:
  securitySchemes:
    cookieAuth:
      type: apiKey
      in: cookie
      name: token_sesion
      description: Cualquier usuario autenticado (RequireAuthorization sin policy específica).
    PersonalAutorizado:
      type: apiKey
      in: cookie
      name: token_sesion
      description: Requiere rol Gerente o Administrador (policy PersonalAutorizado).
    Cliente:
      type: apiKey
      in: cookie
      name: token_sesion
      description: Requiere rol Cliente (policy Cliente).

  schemas:
    ErrorResponse:
      type: object
      properties:
        error:
          type: string
          description: Mensaje de error
        mensaje:
          type: string
          description: Mensaje alternativo de error

    # ----------------------------------------------------------------------------
    # Usuarios
    # ----------------------------------------------------------------------------
    UsuarioLogin:
      type: object
      properties:
        correo:
          type: string
          format: email
          example: usuario@correo.com
        password:
          type: string
          format: password
          example: miPassword123
      required:
        - correo
        - password

    Login2FA:
      type: object
      properties:
        email:
          type: string
          format: email
          example: usuario@correo.com
        codigoIngresado:
          type: string
          example: '123456'
      required:
        - email
        - codigoIngresado

    NuevoUsiario:
      type: object
      properties:
        NombreUsuario:
          type: string
        FechaNacimiento:
          type: string
          format: date
        Correo:
          type: string
          format: email
        IdRol:
          type: integer
        IdEstadoCivil:
          type: integer
        IdGradoAcademico:
          type: integer
        IdGenero:
          type: integer
        Calle:
          type: string
        idZona:
          type: integer
        NumeroCasa:
          type: integer
        Contrasena:
          type: string
        idPais:
          type: integer
        CI:
          type: integer

    EditarDireccion:
      type: object
      properties:
        CI:
          type: integer
        Zona:
          type: integer
        Calle:
          type: string
        NumeroCasa:
          type: integer

    EditarRol:
      type: object
      properties:
        CI:
          type: integer
        Rol:
          type: integer

    UsuarioDatos:
      type: object
      properties:
        IdUsuario:
          type: integer
        NombreUsuario:
          type: string
        Ci:
          type: integer
        correo:
          type: string
        rol:
          type: string
        salario:
          type: integer
        creado:
          type: string
          format: date-time

    DatosParaSubirDoc:
      type: object
      properties:
        idUSer:
          type: integer
        idtipoDoc:
          type: integer
        tipoDoc:
          type: string

    AñadirCarrera:
      type: object
      properties:
        idUsuario:
          type: integer
        idCarrera:
          type: integer
        Carrera:
          type: string

    DocumentosUsuarioTipo:
      type: object
      properties:
        idDoc:
          type: integer
        nombre:
          type: string
        fechaSubido:
          type: string
          format: date

    # ----------------------------------------------------------------------------
    # Servicios
    # ----------------------------------------------------------------------------
    AñadirServicio:
      type: object
      properties:
        IdCliente:
          type: integer
        calle:
          type: string
        NumeroCasa:
          type: integer
        IdZona:
          type: integer
        IdTipoServicio:
          type: integer
        Fechainicio:
          type: string
          format: date
        FechaFinal:
          type: string
          format: date
          nullable: true
        costo:
          type: number
        Descripcion:
          type: string

    ListarServicio:
      type: object
      properties:
        IdServicio:
          type: integer
        Cliente:
          type: string
        Direccion:
          type: string
        TipoServicio:
          type: string
        FechaInicio:
          type: string
          format: date
        FechaFinal:
          type: string
          format: date
          nullable: true
        costo:
          type: number

    InfoServicio:
      type: object
      properties:
        IdServicio:
          type: integer
        NombreEmpresa:
          type: string
        NombreCliente:
          type: string
        Contacto:
          type: string
          nullable: true
        NumeroCasa:
          type: integer
        Calle:
          type: string
        Zona:
          type: string
        TipoServicio:
          type: string
        FechaInicio:
          type: string
          format: date
        FechaFinal:
          type: string
          format: date
          nullable: true
        Costo:
          type: number
        Descripcion:
          type: string
          nullable: true
        Create_at:
          type: string
          format: date-time

    AsignarUsuariosServicios:
      type: object
      properties:
        idUsuario:
          type: integer
        IdServicio:
          type: integer
        idHorario:
          type: integer
        idDiasLaborales:
          type: integer
        HoraDeEntrada:
          type: string
          nullable: true
        HoraDeSalida:
          type: string
          nullable: true
        DiasLaborales:
          type: string
          nullable: true

    AsignarMaquinariaServicios:
      type: object
      properties:
        IdServicio:
          type: integer
        IdMaquinaria:
          type: integer
        CantidadMaquinaria:
          type: integer
        DescripcionMaquinaria:
          type: string

    AsignarRecursoServicios:
      type: object
      properties:
        idServicio:
          type: integer
        IdRecurso:
          type: integer
        CantidadRecursos:
          type: integer

    HorarioDTO:
      type: object
      properties:
        idhorario:
          type: integer
        horaEntrada:
          type: string
        horaSalida:
          type: string

    AddServicioTerminado:
      type: object
      properties:
        idServicio:
          type: integer
        IdSatidfaccion:
          type: integer
        Comentarios:
          type: string

    ListarServicioTerminado:
      type: object
      properties:
        IdServicioTerminado:
          type: integer
        NombreCliente:
          type: string
        NomnreEmpresa:
          type: string

    InfoServicioTerminado:
      type: object
      properties:
        IdServicioTerminado:
          type: integer
        NombreCliente:
          type: string
        NombreEmpresa:
          type: string
        NIT:
          type: integer
        Direccion:
          type: string
        TipoServicio:
          type: string
        FechaInicio:
          type: string
          format: date
        FechaFinal:
          type: string
          format: date
          nullable: true
        Costo:
          type: number
        Descripcion:
          type: string
          nullable: true
        Satisfaccion:
          type: string
        Comentarios:
          type: string
          nullable: true

    # ----------------------------------------------------------------------------
    # Maquinaria
    # ----------------------------------------------------------------------------
    ListarMaquinaria:
      type: object
      properties:
        IdMaquinaria:
          type: integer
        NombreMaquinaria:
          type: string
        CodigoInventario:
          type: string
        TipoMaquinaria:
          type: string

    InfoMaquinaria:
      type: object
      properties:
        IdMaquinaria:
          type: integer
        NombreMaquinaria:
          type: string
        CodigoInventario:
          type: string
        Provedor:
          $ref: '#/components/schemas/ProvedorInfo'
        TipoMaquinaria:
          type: string
        EstadoCalidad:
          type: string
        Marca:
          $ref: '#/components/schemas/MaquinariaMarca'
        Descripcion:
          type: string
          nullable: true

    ProvedorInfo:
      type: object
      properties:
        Nombre:
          type: string
        Empresa:
          type: string
        NIT:
          type: integer

    MaquinariaMarca:
      type: object
      properties:
        NombreMarca:
          type: string
        Pais:
          type: string

    AgregarMaquinaria:
      type: object
      properties:
        NombreMaquinaria:
          type: string
        CodigoInv:
          type: string
        IdProvedor:
          type: integer
        TipoMaquinaria:
          type: integer
        EstadoCalidad:
          type: integer
        IdMarcaMaquinaria:
          type: integer
        Descripcion:
          type: string

    AgragarMarcaMaquinaria:
      type: object
      properties:
        IdPais:
          type: integer
        NombreMarca:
          type: string

    MostrarMarcas:
      type: object
      properties:
        IdMarca:
          type: integer
        Pais:
          type: string
        NombreMarca:
