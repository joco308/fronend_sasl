openapi: 3.1.0
info:
  title: Api SASL
  version: 1.0.0
  description: API del Sistema de Administración de Servicios SASL.
  contact:
    email: dinerus3452@gmail.com

servers:
  - url: http://localhost:5112
    description: Desarrollo (HTTP)
  - url: https://localhost:7102
    description: Desarrollo (HTTPS)

tags:
  - name: Usuarios
    description: Gestión de usuarios internos (trabajadores, administradores)
  - name: Clientes
    description: Gestión de clientes y autenticación de clientes
  - name: Servicios
    description: Gestión de servicios, asignación de empleados, maquinaria y recursos
  - name: Maquinaria
    description: Gestión de maquinaria, marcas, mantenimiento y estados
  - name: Productos
    description: Gestión de recursos/productos e inventario
  - name: Proveedores
    description: Gestión de proveedores
  - name: Trabajadores
    description: Consulta de trabajadores, roles y exportación CSV
  - name: Reportes
    description: Incidentes, memorandos, PDF, estado de maquinaria y CSV
  - name: Cobros
    description: Gestión de cobros, pagos y códigos QR
  - name: Catálogos
    description: Catálogos y subdominios del sistema

paths:
  # ==============================================================================
  # USUARIOS
  # ==============================================================================
  /Api/Usuarios:
    get:
      tags:
        - Usuarios
      summary: Obtiene la lista completa de trabajadores
      operationId: listarUsuarios
      security:
        - PersonalAutorizado: []
      responses:
        '200':
          description: Lista de trabajadores
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/UsuarioDatos'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'

  /Api/Usuarios/solicitar-2fa:
    post:
      tags:
        - Usuarios
      summary: Pide correo y contraseña y envía código 2FA al correo
      operationId: solicitar2faUsuario
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/UsuarioLogin'
      responses:
        '200':
          description: Código enviado al correo
          content:
            application/json:
              schema:
                type: object
                properties:
                  mensaje:
                    type: string
                    example: Código enviado al correo
        '401':
          description: Credenciales incorrectas
          content:
            application/json:
              schema:
                type: object
                properties:
                  mensaje:
                    type: string
                  example: Credenciales incorrectas.

  /Api/Usuarios/verificar-2fa:
    post:
      tags:
        - Usuarios
      summary: Verifica el código 2FA y entrega el token en cookie
      operationId: verificar2faUsuario
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/Login2FA'
      responses:
        '200':
          description: Autenticación exitosa (cookie token_sesion seteada)
          headers:
            Set-Cookie:
              schema:
                type: string
                example: token_sesion=xxx; HttpOnly; Secure; SameSite=Strict; Path=/
          content:
            application/json:
              schema:
                type: object
                properties:
                  mensaje:
                    type: string
                    example: Autenticación exitosa
        '400':
          $ref: '#/components/responses/BadRequest'
        '404':
          $ref: '#/components/responses/NotFound'

  /Api/Usuarios/{servicio}:
    get:
      tags:
        - Usuarios
      summary: Obtiene trabajadores filtrados por asignación a servicio
      operationId: usuariosFiltrados
      security:
        - PersonalAutorizado: []
      parameters:
        - name: servicio
          in: path
          required: true
          schema:
            type: boolean
          description: 'true = con servicio, false = sin servicio'
      responses:
        '200':
          description: Lista filtrada
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/UsuarioDatos'
        '404':
          $ref: '#/components/responses/NotFound'

  /Api/Usuarios/nuevoUsuario:
    post:
      tags:
        - Usuarios
      summary: Registra un nuevo trabajador y su dirección
      operationId: crearUsuario
      security:
        - PersonalAutorizado: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/NuevoUsiario'
      responses:
        '201':
          description: Usuario creado exitosamente
          content:
            application/json:
              schema:
                type: object
                properties:
                  mensaje:
                    type: string
                    example: Usuario creado exitosamente
        '400':
          $ref: '#/components/responses/BadRequest'

  /Api/Usuarios/{ci}/direccion:
    patch:
      tags:
        - Usuarios
      summary: Actualiza únicamente la dirección del usuario
      operationId: editarDireccionUsuario
      security:
        - PersonalAutorizado: []
      parameters:
        - name: ci
          in: path
          required: true
          schema:
            type: integer
          description: Cédula de identidad del usuario
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/EditarDireccion'
      responses:
        '200':
          description: Dirección actualizada correctamente
        '400':
          $ref: '#/components/responses/BadRequest'
        '404':
          $ref: '#/components/responses/NotFound'

  /Api/Usuarios/{ci}/rol:
    patch:
      tags:
        - Usuarios
      summary: Cambia el nivel de acceso (Rol) de un trabajador
      operationId: editarRolUsuario
      security:
        - PersonalAutorizado: []
      parameters:
        - name: ci
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/EditarRol'
      responses:
        '200':
          description: Rol actualizado correctamente
        '400':
          $ref: '#/components/responses/BadRequest'
        '404':
          $ref: '#/components/responses/NotFound'

  /Api/Usuarios/SubirArchivo:
    post:
      tags:
        - Usuarios
      summary: Sube archivos de trabajadores (multipart)
      operationId: subirArchivoUsuario
      security:
        - PersonalAutorizado: []
      requestBody:
        required: true
        content:
          multipart/form-data:
            schema:
              type: object
              properties:
                dto:
                  $ref: '#/components/schemas/DatosParaSubirDoc'
                archivo:
                  type: string
                  format: binary
      responses:
        '201':
          description: Archivo subido correctamente
        '400':
          $ref: '#/components/responses/BadRequest'
        '404':
          $ref: '#/components/responses/NotFound'

  /Api/Usuarios/VerArchivo/{id}:
    get:
      tags:
        - Usuarios
      summary: Descarga un archivo de usuario por ID de documento
      operationId: verArchivoUsuario
      security:
        - PersonalAutorizado: []
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
        - name: tipo
          in: query
          required: true
          schema:
            type: integer
      responses:
        '200':
          description: Archivo PDF
          content:
            application/pdf:
              schema:
                type: string
                format: binary
        '400':
          $ref: '#/components/responses/BadRequest'
        '404':
          $ref: '#/components/responses/NotFound'

  /Api/Usuarios/AgregarCarrera:
    post:
      tags:
        - Usuarios
      summary: Agrega una carrera universitaria a un usuario
      operationId: agregarCarreraUsuario
      security:
        - PersonalAutorizado: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/AñadirCarrera'
      responses:
        '200':
          description: Carrera agregada
        '400':
          $ref: '#/components/responses/BadRequest'
        '404':
          $ref: '#/components/responses/NotFound'

  /Api/Usuarios/Docuemntos/Listar:
    get:
      tags:
        - Usuarios
      summary: Lista documentos de un usuario por tipo
      operationId: listarDocumentosUsuario
      security:
        - cookieAuth: []
      parameters:
        - name: id
          in: query
          required: true
          schema:
            type: integer
        - name: idtipo
          in: query
          required: true
          schema:
            type: integer
      responses:
        '200':
          description: Lista de documentos
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/DocumentosUsuarioTipo'
        '404':
          $ref: '#/components/responses/NotFound'

  # ==============================================================================
  # SERVICIOS
  # ==============================================================================
  /Api/Servicios:
    get:
      tags:
        - Servicios
      summary: Muestra los servicios en forma de lista resumida
      operationId: listarServicios
      security:
        - PersonalAutorizado: []
      responses:
        '200':
          description: Lista de servicios
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/ListarServicio'
    post:
      tags:
        - Servicios
      summary: Añade un servicio nuevo
      operationId: crearServicio
      security:
        - PersonalAutorizado: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/AñadirServicio'
      responses:
        '201':
          description: Servicio creado
        '400':
          $ref: '#/components/responses/BadRequest'
        '404':
          $ref: '#/components/responses/NotFound'

  /Api/Servicios/Nuevo:
    post:
      tags:
        - Servicios
      summary: Añade un servicio nuevo
      operationId: crearServicioAlterno
      security:
        - PersonalAutorizado: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/AñadirServicio'
      responses:
        '201':
          description: Servicio creado
        '400':
          $ref: '#/components/responses/BadRequest'
        '404':
          $ref: '#/components/responses/NotFound'

  /Api/Servicios/{id}:
    get:
      tags:
        - Servicios
      summary: Muestra los detalles de un servicio por su ID
      operationId: infoServicio
      security:
        - PersonalAutorizado: []
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        '200':
          description: Información del servicio
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/InfoServicio'
        '404':
          $ref: '#/components/responses/NotFound'

  /Api/Servicios/Asignar-empleado:
    post:
      tags:
        - Servicios
      summary: Asigna un usuario/trabajador a un servicio
      operationId: asignarEmpleadoServicio
      security:
        - PersonalAutorizado: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/AsignarUsuariosServicios'
      responses:
        '200':
          description: Empleado asignado al servicio exitosamente
        '400':
          $ref: '#/components/responses/BadRequest'
        '404':
          $ref: '#/components/responses/NotFound'

  /Api/Servicios/asignar-maquinaria:
    post:
      tags:
        - Servicios
      summary: Asigna una maquinaria a un servicio
      operationId: asignarMaquinariaServicio
      security:
        - PersonalAutorizado: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/AsignarMaquinariaServicios'
      responses:
        '200':
          description: Maquinaria asignada correctamente
        '400':
          $ref: '#/components/responses/BadRequest'
        '404':
          $ref: '#/components/responses/NotFound'

  /Api/Servicios/asignar-recurso:
    post:
      tags:
        - Servicios
      summary: Asigna un recurso a un servicio
      operationId: asignarRecursoServicio
      security:
        - PersonalAutorizado: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/AsignarRecursoServicios'
      responses:
        '200':
          description: Recurso asignado correctamente
        '400':
          $ref: '#/components/responses/BadRequest'
        '404':
          $ref: '#/components/responses/NotFound'

  /Api/Servicios/exportar-csv:
    get:
      tags:
        - Servicios
      summary: Genera y descarga CSV con información completa de servicios
      operationId: exportarServiciosCSV
      security:
        - PersonalAutorizado: []
      responses:
        '200':
          description: Archivo CSV
          content:
            text/csv:
              schema:
                type: string
                format: binary
        '404':
          $ref: '#/components/responses/NotFound'

  /Api/Servicios/ServicioTerminado/Nuevo:
    post:
      tags:
        - Servicios
      summary: Marca un servicio como terminado
      operationId: servicioTerminado
      security:
        - PersonalAutorizado: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/AddServicioTerminado'
      responses:
        '201':
          description: Servicio terminado creado
        '400':
          $ref: '#/components/responses/BadRequest'
        '404':
          $ref: '#/components/responses/NotFound'

  /Api/Servicios/horarios:
    get:
      tags:
        - Servicios
      summary: Muestra la lista de horarios disponibles
      operationId: listarHorarios
      security:
        - PersonalAutorizado: []
      responses:
        '200':
          description: Lista de horarios
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/HorarioDTO'

  /Api/Servicios/ServicioTerminado:
    get:
      tags:
        - Servicios
      summary: Lista servicios terminados (resumido)
      operationId: listarServiciosTerminados
      security:
        - PersonalAutorizado: []
      responses:
        '200':
          description: Lista de servicios terminados
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/ListarServicioTerminado'

  /Api/Servicios/ServicioTerminado/{id}:
    get:
      tags:
        - Servicios
      summary: Detalles de un servicio terminado por ID
      operationId: infoServicioTerminado
      security:
        - PersonalAutorizado: []
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        '200':
          description: Información del servicio terminado
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/InfoServicioTerminado'
        '404':
          $ref: '#/components/responses/NotFound'

  # ==============================================================================
  # MAQUINARIA
  # ==============================================================================
  /Api/Maquinaria:
    get:
      tags:
        - Maquinaria
      summary: Lista todas las maquinarias (versión resumida)
      operationId: listarMaquinarias
      security:
        - PersonalAutorizado: []
      responses:
        '200':
          description: Lista de maquinarias
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/ListarMaquinaria'
    post:
      tags:
        - Maquinaria
      summary: Añade una nueva maquinaria
      operationId: crearMaquinaria
      security:
        - PersonalAutorizado: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/AgregarMaquinaria'
      responses:
        '201':
          description: Maquinaria creada
        '400':
          $ref: '#/components/responses/BadRequest'
        '404':
          $ref: '#/components/responses/NotFound'

  /Api/Maquinaria/{id}:
    get:
      tags:
        - Maquinaria
      summary: Información detallada de una maquinaria por ID
      operationId: infoMaquinaria
      security:
        - PersonalAutorizado: []
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        '200':
          description: Información de la maquinaria
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/InfoMaquinaria'
        '404':
          $ref: '#/components/responses/NotFound'

  /Api/Maquinaria/marcas:
    get:
      tags:
        - Maquinaria
      summary: Lista todas las marcas de maquinaria
      operationId: listarMarcasMaquinaria
      security:
        - PersonalAutorizado: []
      responses:
        '200':
          description: Lista de marcas
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/MostrarMarcas'
    post:
      tags:
        - Maquinaria
      summary: Añade una nueva marca de maquinaria
      operationId: crearMarcaMaquinaria
      security:
        - PersonalAutorizado: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/AgragarMarcaMaquinaria'
      responses:
        '200':
          description: Marca creada
        '400':
          $ref: '#/components/responses/BadRequest'
        '404':
          $ref: '#/components/responses/NotFound'

  /Api/Maquinaria/estados:
    get:
      tags:
        - Maquinaria
      summary: Lista estados de calidad (subdominios)
      operationId: listarEstadosMaquinaria
      security:
        - PersonalAutorizado: []
      responses:
        '200':
          description: Lista de estados
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/Estado'

  /Api/Maquinaria/Short{id}:
    get:
      tags:
        - Maquinaria
      summary: Información resumida de una maquinaria
      operationId: infoResumidaMaquinaria
      security:
        - cookieAuth: []
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        '200':
          description: Información resumida
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/InfoResuminaMaquinara'
        '404':
          $ref: '#/components/responses/NotFound'

  /Api/Maquinaria/mantenimiento:
    get:
      tags:
        - Maquinaria
      summary: Lista todos los mantenimientos
      operationId: listarMantenimientos
      security:
        - PersonalAutorizado: []
      responses:
        '200':
          description: Lista de mantenimientos
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/ListarManteniminto'
    post:
      tags:
        - Maquinaria
      summary: Añade un mantenimiento a una maquinaria
      operationId: crearMantenimiento
      security:
        - PersonalAutorizado: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/AddManteniminetoMaquinaria'
      responses:
        '201':
          description: Mantenimiento creado
        '400':
          $ref: '#/components/responses/BadRequest'
        '404':
          $ref: '#/components/responses/NotFound'

  /Api/Maquinaria/mantenimiento/{id}:
    get:
      tags:
        - Maquinaria
      summary: Detalles de un mantenimiento por ID
      operationId: infoMantenimiento
      security:
        - PersonalAutorizado: []
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        '200':
          description: Información del mantenimiento
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/InfoManteniminto'
        '404':
          $ref: '#/components/responses/NotFound'

  # ==============================================================================
  # PRODUCTOS
  # ==============================================================================
  /Api/Productos:
    get:
      tags:
        - Productos
      summary: Lista todos los recursos/productos
      operationId: listarProductos
      responses:
        '200':
          description: Lista de recursos
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/ListarRecurso'
    post:
      tags:
        - Productos
      summary: Añade un nuevo recurso
      operationId: crearProducto
      security:
        - PersonalAutorizado: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/AñadirRecurso'
      responses:
        '200':
          description: Recurso creado
        '400':
          $ref: '#/components/responses/BadRequest'
        '404':
          $ref: '#/components/responses/NotFound'

  /Api/Productos/editar/nombre:
    patch:
      tags:
        - Productos
      summary: Edita el nombre de un recurso
      operationId: editarNombreProducto
      security:
        - PersonalAutorizado: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/EditarNombre'
      responses:
        '200':
          description: Nombre actualizado
        '400':
          $ref: '#/components/responses/BadRequest'
        '404':
          $ref: '#/components/responses/NotFound'

  /Api/Productos/editar/descripcion:
    patch:
      tags:
        - Productos
      summary: Edita la descripción de un recurso
      operationId: editarDescripcionProducto
      security:
        - PersonalAutorizado: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/EditarDescripcion'
      responses:
        '200':
          description: Descripción actualizada
        '400':
          $ref: '#/components/responses/BadRequest'
        '404':
          $ref: '#/components/responses/NotFound'

  # ==============================================================================
  # PROVEEDORES
  # ==============================================================================
  /Api/Proveedores:
    get:
      tags:
        - Proveedores
      summary: Lista resumida de todos los proveedores
      operationId: listarProveedores
      security:
        - PersonalAutorizado: []
      responses:
        '200':
          description: Lista de proveedores
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/ListarProvedores'
    post:
      tags:
        - Proveedores
      summary: Registra un nuevo proveedor
      operationId: crearProveedor
      security:
        - PersonalAutorizado: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/AñadirProvedor'
      responses:
        '200':
          description: Proveedor creado
        '400':
          $ref: '#/components/responses/BadRequest'
        '404':
          $ref: '#/components/responses/NotFound'

  /Api/Proveedores/{id}:
    get:
      tags:
        - Proveedores
      summary: Información detallada de un proveedor por ID
      operationId: infoProveedor
      security:
        - PersonalAutorizado: []
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        '200':
          description: Información del proveedor
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/InformacionProvedor'
        '404':
          $ref: '#/components/responses/NotFound'

  /Api/Proveedores/telefono:
    post:
      tags:
        - Proveedores
      summary: Asocia un teléfono a un proveedor
      operationId: agregarTelefonoProveedor
      security:
        - PersonalAutorizado: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/AgregarTelefonoProvedor'
      responses:
